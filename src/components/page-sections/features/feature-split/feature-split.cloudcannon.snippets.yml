featureSplit:
  snippet: <FeatureSplit heading=[[heading]] [[args]] />
  inline: false
  preview:
    text:
      - Feature Split
    subtext:
      - key: heading
    icon: view_week
  params:
    args:
      parser: key_values
      options:
        models:
          - editor_key: id
            type: string
            optional: true
            remove_empty: true
          - editor_key: eyebrow
            type: string
            optional: true
            remove_empty: true
          - editor_key: subtext
            type: string
            optional: true
            remove_empty: true
          - editor_key: buttonSections
            type: array
            optional: true
          - editor_key: imageSource
            type: string
            optional: true
            remove_empty: true
          - editor_key: imageAlt
            type: string
            optional: true
            remove_empty: true
          - editor_key: imageAspectRatio
            type: string
            optional: true
            remove_empty: true
          - editor_key: imageRounded
            type: boolean
            optional: true
          - editor_key: reverse
            type: boolean
            optional: true
          - editor_key: colorScheme
            type: string
            optional: true
            remove_empty: true
          - editor_key: backgroundColor
            type: string
            optional: true
            remove_empty: true
        format:
          ref: "mdx_format"
    heading:
      parser: argument
      options:
        model:
          editor_key: heading
          type: string
          optional: true
        format:
          root_value_boundary_optional:
            string: false
          root_value_boundary:
            start: "{"
            end: "}"
          string_boundary:
            - '"'
  _inputs_from_glob:
    - /src/components/page-sections/features/feature-split/feature-split.cloudcannon.inputs.yml
